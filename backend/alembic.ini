[alembic]
# Path to migration scripts, relative to this ini file.
script_location = alembic

# Template used to generate migration file names.
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# Prepend the backend/ directory to sys.path so `app` is importable
# from env.py regardless of where alembic is invoked from.
prepend_sys_path = .

# Timezone for the "created date" comment in generated revisions.
timezone = UTC

# Max length of characters to apply to the "slug" field.
truncate_slug_length = 40

# `sqlalchemy.url` is intentionally left blank here -- env.py overrides
# it at runtime from `Settings.database_url`, so there is exactly one
# source of truth for the connection string (the app's environment
# variables), not two.
sqlalchemy.url =

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
